<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Локальный 2FA генератор офлайн</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --card: #171a21;
      --line: #2b3140;
      --text: #f3f5f7;
      --muted: #9aa4b2;
      --accent: #41d39f;
      --accent-dark: #2fb987;
      --error: #ff6b81;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--muted);
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #10131a;
      color: var(--text);
      font-size: 16px;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
    }
    .row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 16px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #08110d;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover {
      background: var(--accent-dark);
    }
    .secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
    }
    .secondary:hover {
      background: #1b202a;
    }
    .code {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #10131a;
    }
    .digits {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
    }
    .meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }
    .error {
      margin-top: 12px;
      color: var(--error);
      font-size: 14px;
      min-height: 20px;
    }
    .note {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }
    code {
      background: #10131a;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 2px 6px;
    }
    @media (max-width: 520px) {
      .digits { font-size: 40px; }
      .row > * { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Локальный 2FA генератор</h1>
    <p>Полностью офлайн. Вставь secret key или строку <code>otpauth://...</code>. Код считается прямо в браузере.</p>

    <label for="secret">Secret key</label>
    <input id="secret" type="text" placeholder="Например: JBSWY3DPEHPK3PXP" autocomplete="off" spellcheck="false">

    <div class="row">
      <button id="generate">Получить код</button>
      <button id="copy" class="secondary" type="button">Скопировать код</button>
    </div>

    <div class="error" id="error"></div>

    <section class="code">
      <div class="digits" id="code">000000</div>
      <div class="meta" id="timer">Осталось: 30 сек</div>
    </section>

    <div class="note">Для офлайн-работы держи этот HTML-файл рядом с файлом <code>otpauth.umd.min.js</code> в одной папке.</div>
  </main>

  <script src="./otpauth.umd.min.js"></script>
  <script>
    const input = document.getElementById('secret');
    const codeEl = document.getElementById('code');
    const timerEl = document.getElementById('timer');
    const errorEl = document.getElementById('error');
    const generateBtn = document.getElementById('generate');
    const copyBtn = document.getElementById('copy');

    let activeSecret = '';
    let lastStep = -1;

    function normalizeSecret(value) {
      return value
        .trim()
        .replace(/^otpauth:\/\/totp\/.*secret=([^&]+).*$/i, '$1')
        .replace(/\s+/g, '')
        .toUpperCase();
    }

    function generateCode(secret) {
      const totp = new OTPAuth.TOTP({
        issuer: 'Local 2FA',
        label: 'Secret',
        algorithm: 'SHA1',
        digits: 6,
        period: 30,
        secret: OTPAuth.Secret.fromBase32(secret),
      });
      return totp.generate();
    }

    function refresh() {
      const secondsLeft = 30 - (Math.floor(Date.now() / 1000) % 30);
      timerEl.textContent = `Осталось: ${secondsLeft} сек`;

      if (!activeSecret) return;

      const step = Math.floor(Date.now() / 30000);
      if (step !== lastStep) {
        lastStep = step;
        try {
          codeEl.textContent = generateCode(activeSecret);
          errorEl.textContent = '';
        } catch {
          codeEl.textContent = '000000';
          errorEl.textContent = 'Неверный secret key. Нужен корректный Base32 ключ.';
          activeSecret = '';
        }
      }
    }

    function start() {
      const secret = normalizeSecret(input.value);
      if (!secret) {
        activeSecret = '';
        codeEl.textContent = '000000';
        errorEl.textContent = '';
        return;
      }
      activeSecret = secret;
      lastStep = -1;
      refresh();
    }

    generateBtn.addEventListener('click', start);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') start();
    });
    input.addEventListener('input', () => {
      if (!input.value.trim()) {
        activeSecret = '';
        codeEl.textContent = '000000';
        errorEl.textContent = '';
      }
    });

    copyBtn.addEventListener('click', async () => {
      if (!/^\d{6}$/.test(codeEl.textContent)) return;
      try {
        await navigator.clipboard.writeText(codeEl.textContent);
        copyBtn.textContent = 'Скопировано';
        setTimeout(() => copyBtn.textContent = 'Скопировать код', 1200);
      } catch {
        errorEl.textContent = 'Не удалось скопировать код.';
      }
    });

    refresh();
    setInterval(refresh, 250);
  </script>
</body>
</html>
